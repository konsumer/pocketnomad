[platformio]
default_envs = native

[env:native]
platform = native
build_type = debug
build_flags = -O0 -std=c++14 -lSDL2
  -I"${sysenv.HOMEBREW_PREFIX}/include/SDL2"
  -L"${sysenv.HOMEBREW_PREFIX}/lib"
  -I"/usr/local/include/SDL2"
  -L"/usr/local/lib"
lib_deps =
  m5stack/M5GFX
  Crypto=https://github.com/attermann/Crypto
  Reticulum=https://github.com/konsumer/reticulum-arduino

[env:cardputer]
platform = espressif32@6.7.0
board = esp32-s3-devkitc-1
framework = arduino
upload_protocol = esp-builtin
upload_speed = 115200
build_flags =
    -DESP32S3
    -DCORE_DEBUG_LEVEL=5
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
lib_deps =
    m5stack/M5GFX
    m5stack/M5Cardputer
    jgromes/RadioLib
    https://github.com/m5stack/TinyGPSPlus
    z3t0/IRremote@^4.7.0
    Crypto=https://github.com/attermann/Crypto
    Reticulum=https://github.com/konsumer/reticulum-arduino